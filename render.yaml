services:
  - type: web
    name: gemini-bot
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python gemini_bot.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: TELEGRAM_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
